    <line x1="299.7" y1="241.8" x2="392" y2="212"/>
    <line x1="283" y1="293.2" x2="340" y2="372"/>
    <line x1="229" y1="293.2" x2="172" y2="372"/>
    <line x1="212.3" y1="241.8" x2="120" y2="212"/>
  </g>

  <!-- central pentagon -->
  <path d="M256 210 L299.7 241.8 L283 293.2 L229 293.2 L212.3 241.8 Z" fill="#0c1430"/>

  <!-- rim arcs (pentagon corners at the edge) -->
  <g fill="none" stroke="#0c1430" stroke-width="11" stroke-linecap="round">
    <path d="M232 116 a150 150 0 0 1 48 0"/>
    <path d="M380 196 a150 150 0 0 1 22 44"/>
