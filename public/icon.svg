<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="World Cup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2452"/>
      <stop offset="1" stop-color="#0c1430"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.3" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe07a"/>
      <stop offset="0.45" stop-color="#ffcf3d"/>
      <stop offset="1" stop-color="#e0a400"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b97f00"/>
      <stop offset="0.5" stop-color="#ffe899"/>
      <stop offset="1" stop-color="#b97f00"/>
    </linearGradient>
  </defs>

  <!-- maskable background: full bleed, art kept inside central safe zone -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#sheen)"/>

  <!-- World Cup trophy: globe twisting up out of a spiralling base, centred with safe padding -->
  <g stroke="url(#goldEdge)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <!-- the globe / orb crowning the trophy -->
    <ellipse cx="256" cy="150" rx="60" ry="66" fill="url(#gold)"/>
    <!-- globe meridians + equator (subtle, survive shrinking) -->
    <g fill="none" stroke="#b97f00" stroke-width="5" opacity="0.55">
      <path d="M256 86 Q224 150 256 216"/>
      <path d="M256 86 Q288 150 256 216"/>
      <path d="M198 138 Q256 168 314 138"/>
    </g>

    <!-- twisting body: two sweeping flanks rising from the base into the globe -->
    <path d="M214 206
             C 196 250 196 300 224 332
             L 200 360
             C 168 322 168 252 196 196
             Z" fill="url(#gold)"/>
    <path d="M298 206
             C 316 250 316 300 288 332
             L 312 360
             C 344 322 344 252 316 196
             Z" fill="url(#gold)"/>
    <!-- central column joining the flanks -->
    <path d="M224 200 H288 V300 Q256 336 224 300 Z" fill="url(#gold)"/>

    <!-- plinth / base -->
    <path d="M196 360 H316 L304 392 H208 Z" fill="url(#gold)"/>
    <rect x="188" y="392" width="136" height="30" rx="10" fill="url(#gold)"/>
  </g>

  <!-- soft vertical highlight down the trophy for a polished metal feel -->
  <path d="M250 92 C238 150 238 300 246 360 L260 360 C252 300 252 150 262 92 Z"
        fill="#ffffff" opacity="0.22"/>
</svg>
